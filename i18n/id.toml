# Format tanggal Tera untuk daftar posting
# (tanggal terbit, daftar posting tag, dll).
# Tidak digunakan di komentar; komentar memakai "date_locale".
# Lihat https://docs.rs/chrono/0.4.31/chrono/format/strftime/index.html
